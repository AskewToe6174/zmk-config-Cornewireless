# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Luna cat reactive to WPM on the central half (sleeps when idle, runs when typing fast)
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=y
# Upstream module ships with both WPM_LUNA and WPM_BONGO_CAT defaulting to y,
# which causes a linker collision (idle_imgs/slow_imgs/... are non-static globals
# in both bongo_cat.c and luna.c). Force WPM_BONGO_CAT off to pick Luna.
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n
